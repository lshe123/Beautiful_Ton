<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>منصة إنشاء الـ Jettons</title>
    <style>
      body {
        background-color: #0b0e14;
        color: #f3f4f6;
        font-family: system-ui, -apple-system, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
      }
      .container {
        background: #161c26;
        padding: 30px;
        border-radius: 20px;
        max-width: 480px;
        width: 100%;
        border: 1px solid #243145;
        box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      }
      .input-group {
        margin-bottom: 16px;
        text-align: right;
      }
      .input-group label {
        display: block;
        font-size: 14px;
        color: #9ca3af;
        margin-bottom: 6px;
      }
      .input-group input {
        width: 100%;
        padding: 12px;
        background: #0b0e14;
        border: 1px solid #243145;
        border-radius: 10px;
        color: white;
        box-sizing: border-box;
        font-size: 15px;
      }
      .input-group input:focus {
        border-color: #0098ea;
        outline: none;
      }
      .btn {
        background: #0098ea;
        color: white;
        border: none;
        padding: 14px;
        border-radius: 12px;
        width: 100%;
        cursor: pointer;
        font-weight: bold;
        font-size: 16px;
        margin-top: 20px;
        transition: all 0.2s;
      }
      .btn:hover {
        background: #0082c8;
      }
      .btn:disabled {
        background: #243145;
        color: #6b7280;
        cursor: not-allowed;
      }
      .address-box {
        background: #0b0e14;
        padding: 10px;
        border-radius: 8px;
        font-family: monospace;
        font-size: 12px;
        color: #0098ea;
        word-break: break-all;
        margin-top: 5px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.jsx"></script>
  </body>
</html>
