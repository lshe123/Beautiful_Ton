<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>منصة الـ Jettons</title>
    <style>
      body {
        background-color: #0f172a;
        color: #f8fafc;
        font-family: system-ui, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
      }
      .card {
        background: #1e293b;
        padding: 24px;
        border-radius: 16px;
        text-align: center;
        max-width: 400px;
        width: 100%;
        border: 1px solid #334155;
      }
      .btn {
        background: #2563eb;
        color: white;
        border: none;
        padding: 12px;
        border-radius: 8px;
        width: 100%;
        cursor: pointer;
        font-weight: bold;
        margin-top: 15px;
      }
      .address {
        background: #0f172a;
        padding: 8px;
        border-radius: 6px;
        font-family: monospace;
        font-size: 12px;
        color: #38bdf8;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.jsx"></script>
  </body>
</html>
