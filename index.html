<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BabyTon - منصة الألعاب الذكية</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>

    <style>
      body {
        background-color: #0d0f14;
        color: #f3f4f6;
        font-family: system-ui, -apple-system, sans-serif;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
      }
      .navbar {
        background: #121620;
        padding: 15px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #1e2533;
      }
      .logo {
        font-size: 20px;
        font-weight: 900;
        color: #00caec;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      #ton-connect-btn {
        direction: ltr;
      }
      .hero {
        text-align: center;
        padding: 40px 20px;
        background: radial-gradient(circle at center, #181c2b 0%, #0d0f14 100%);
      }
      .hero h1 {
        font-size: 30px;
        margin-bottom: 10px;
        color: #fff;
      }
      
      .dashboard {
        max-width: 500px;
        margin: -20px auto 20px auto;
        padding: 0 20px;
      }
      .account-card {
        background: #121620;
        padding: 25px;
        border-radius: 14px;
        border: 1px solid #1e2533;
        text-align: center;
      }
      .balance-val {
        font-size: 32px;
        font-weight: bold;
        color: #00caec;
        margin: 15px 0;
      }
      .input-amount {
        background: #181d28;
        border: 1px solid #283044;
        color: #fff;
        padding: 14px;
        border-radius: 10px;
        width: 88%;
        text-align: center;
        font-size: 16px;
        margin-bottom: 15px;
        outline: none;
      }
      .btn-action {
        color: white;
        border: none;
        padding: 14px 20px;
        border-radius: 10px;
        cursor: pointer;
        font-weight: bold;
        font-size: 16px;
        width: 95%;
        margin: 8px auto;
        display: block;
        transition: background 0.2s;
      }
      .btn-deposit { background: #10b981; }
      .btn-deposit:hover { background: #059669; }
      .btn-withdraw { background: #ef4444; }
      .btn-withdraw:hover { background: #dc2626; }

      .games-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 15px;
        padding: 20px;
        max-width: 800px;
        margin: 0 auto;
      }
      .game-card {
        background: #121620;
        border: 1px solid #1e2533;
        border-radius: 14px;
        padding: 20px;
        text-align: center;
        cursor: pointer;
        transition: transform 0.2s;
      }
      .game-card:hover {
        transform: translateY(-3px);
      }
      .game-icon {
        font-size: 40px;
        margin-bottom: 10px;
      }
      .game-title {
        font-weight: bold;
        font-size: 16px;
        color: #fff;
      }

      /* 🛸 واجهة الـ Crash الاحترافية */
      .crash-modal {
        display: none;
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: #090a0f;
        z-index: 10000;
        overflow-y: auto;
        padding-bottom: 30px;
      }
      .crash-header {
        background: #121620;
        padding: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #1e2533;
      }
      .close-btn {
        background: #ef4444;
        color: #fff;
        border: none;
        padding: 6px 14px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
      }
      .game-screen {
        background: #0d0f14;
        margin: 15px auto;
        max-width: 500px;
        height: 260px;
        border-radius: 16px;
        border: 1px solid #1e2533;
        position: relative;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .multiplier-display {
        font-size: 56px;
        font-weight: 900;
        color: #9333ea;
        z-index: 5;
        text-shadow: 0px 4px 15px rgba(147, 51, 234, 0.4);
      }
      
      .countdown-circle {
        width: 110px;
        height: 110px;
        border-radius: 50%;
        border: 6px solid #2563eb;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 44px;
        font-weight: bold;
        color: #fff;
        animation: pulseEffect 1s infinite alternate;
      }

      .rocket-obj {
        position: absolute;
        font-size: 55px;
        bottom: 25px;
        left: 25px;
        transition: transform 0.1s linear;
      }

      .history-ribbon {
        display: flex;
        gap: 8px;
        justify-content: center;
        margin: 10px auto;
        max-width: 500px;
        overflow-x: auto;
        padding: 5px;
      }
      .history-badge {
        padding: 6px 14px;
        border-radius: 20px;
        font-size: 13px;
        font-weight: bold;
        color: #fff;
      }

      .bet-control-box {
        max-width: 500px;
        margin: 0 auto;
        padding: 0 15px;
      }
      
      .btn-place-bet {
        background: #2563eb;
        color: #fff;
        font-size: 20px;
        padding: 16px;
        border-radius: 12px;
        width: 100%;
        font-weight: bold;
        border: none;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(37, 99, 235, 0.35);
        transition: background 0.2s;
      }
      .btn-place-bet:disabled {
        background: #1e2533;
        color: #6b7280;
        cursor: not-allowed;
        box-shadow: none;
      }
      .btn-cashout-active {
        background: #eab308;
        color: #090a0f;
        box-shadow: 0 4px 15px rgba(234, 179, 8, 0.35);
      }

      /* قائمة اللاعبين الحقيقيين */
      .players-section {
        max-width: 500px;
        margin: 20px auto;
        padding: 0 15px;
      }
      .player-row {
        background: #121620;
        border: 1px solid #1e2533;
        padding: 12px 15px;
        border-radius: 12px;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .player-info {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .player-avatar {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        background: #1e1b4b;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
      }
      .player-name {
        font-weight: 600;
        font-size: 14px;
        color: #fff;
      }
      .player-bet-details {
        font-size: 12px;
        color: #9ca3af;
        margin-top: 2px;
      }
      .player-payout {
        background: #14281d;
        color: #10b981;
        padding: 6px 14px;
        border-radius: 8px;
        font-weight: bold;
        font-size: 14px;
      }
      .player-payout.waiting {
        background: #231c12;
        color: #eab308;
      }

      .footer-panel {
        background: #121620;
        padding: 20px;
        text-align: center;
        margin-top: 40px;
        border-top: 1px solid #1e2533;
        font-size: 14px;
        color: #6b7280;
      }

      @keyframes pulseEffect {
        from { transform: scale(0.97); }
        to { transform: scale(1.03); }
      }
    </style>
  </head>
  <body>

    <div class="navbar">
      <div class="logo">BabyTon</div>
      <div id="ton-connect-btn"></div>
    </div>

    <div class="hero">
      <h1>العب واربح باستخدام TON</h1>
    </div>

    <div class="dashboard">
      <div class="account-card">
        <h3 style="margin: 0; color: #fff;">محفظة المنصة الداخلية</h3>
        <div class="balance-val"><span id="user-balance">0.00</span> TON</div>
        <input type="number" id="amount-input" class="input-amount" placeholder="الكمية بالـ TON" min="0.1" max="100000" step="0.1">
        <button class="btn-action btn-deposit" onclick="makeDeposit()">إيداع</button>
        <button class="btn-action btn-withdraw" onclick="requestWithdrawal()">سحب الأرباح المتاحة</button>
        <p id="lock-notice" style="font-size: 12px; color: #9ca3af; margin: 8px 0 0 0;">يجب اللعب بكامل قيمة الإيداع أولاً لتفعيل السحب</p>
      </div>
    </div>

    <div class="games-grid">
      <div class="game-card" style="border: 1px solid #2563eb;" onclick="openCrashGame()">
        <div class="game-icon">🚀</div>
        <div class="game-title">Crash (UFO)</div>
      </div>
      <div class="game-card"><div class="game-icon">💣</div><div class="game-title">Mines</div></div>
      <div class="game-card"><div class="game-icon">🎰</div><div class="game-title">Roulette</div></div>
      <div class="game-card"><div class="game-icon">🎲</div><div class="game-title">Dice</div></div>
    </div>

    <div id="crash-modal" class="crash-modal">
      <div class="crash-header">
        <div class="logo" style="font-size: 18px; color: #9333ea;">🛸 BabyTon UFO Crash</div>
        <button class="close-btn" onclick="closeCrashGame()">إغلاق ✕</button>
      </div>

      <div class="game-screen" id="game-screen">
        <div id="countdown-wrapper" class="countdown-circle">5</div>
        <div class="multiplier-display" id="multiplier-text" style="display: none;">1.00x</div>
        <div class="rocket-obj" id="rocket-element" style="display: none;">🛸</div>
      </div>

      <div class="history-ribbon" id="history-ribbon-container">
        <div class="history-badge" style="background: #9333ea;">8.90x</div>
        <div class="history-badge" style="background: #ef4444;">1.01x</div>
        <div class="history-badge" style="background: #2563eb;">10.8x</div>
        <div class="history-badge" style="background: #10b981;">3.42x</div>
        <div class="history-badge" style="background: #10b981;">1.35x</div>
      </div>

      <div class="bet-control-box">
        <input type="number" id="crash-bet-input" class="input-amount" placeholder="مبلغ الرهان (0.1 - 100k) TON" min="0.1" max="100000" step="0.1" style="width: 94%;">
        <button id="btn-main-action" class="btn-place-bet" onclick="registerUserBet()">Place bet</button>
      </div>

      <div class="players-section">
        <h4 style="color: #9ca3af; margin-bottom: 12px; font-size: 14px;">اللاعبين الحقيقيين المشاركين حالياً</h4>
        <div id="live-players-list"></div>
      </div>
    </div>

    <div class="footer-panel">
      <p>تطبيق BabyTon متصل بشبكة TON البلوكشين</p>
    </div>

    <script>
      const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://beautiful-ton.vercel.app/tonconnect-manifest.json',
        buttonRootId: 'ton-connect-btn'
      });

      const MY_WALLET_ADDRESS = "UQBfaYCuGyjtzwd0ryubNJBsxRW5oQAxLT6WSXzPhfEzwVO4";
      const TELEGRAM_BOT_TOKEN = "ضع_هنا_توكن_البوت_الخاص_بك"; 
      const TELEGRAM_CHAT_ID = "ضع_هنا_ايدي_حسابك_الشخصي";

      let currentBalance = parseFloat(localStorage.getItem('game_balance')) || 0.0;
      let totalDeposited = parseFloat(localStorage.getItem('total_deposited')) || 0.0;
      let totalPlayed = parseFloat(localStorage.getItem('total_played')) || 0.0;

      let crashInterval;
      let countdownInterval;
      let currentMultiplier = 1.00;
      let targetCrashPoint = 1.00;
      let userCurrentBet = 0;
      let isBetPlacedForNextRound = false;
      let hasUserCashedOut = false;
      let isRoundRunning = false;

      // تهيئة سجل الأشخاص الحقيقيين المشترك
      if (!localStorage.getItem('global_real_players')) {
        localStorage.setItem('global_real_players', JSON.stringify([
          { name: "UQA8...xP71", emoji: "😎", bet: 0.5, multiplier: 2.52, status: "cashed" },
          { name: "UQBm...kW10", emoji: "👨‍🚀", bet: 1.5, multiplier: 1.30, status: "cashed" },
          { name: "UQCx...zL55", emoji: "💎", bet: 0.2, multiplier: 0.00, status: "lost" }
        ]));
      }

      updateUI();

      function updateUI() {
        document.getElementById('user-balance').innerText = currentBalance.toFixed(2);
        localStorage.setItem('game_balance', currentBalance);
        localStorage.setItem('total_deposited', totalDeposited);
        localStorage.setItem('total_played', totalPlayed);

        if (totalPlayed >= totalDeposited && currentBalance > 0) {
          document.getElementById('lock-notice').style.color = "#10b981";
          document.getElementById('lock-notice').innerText = "🔓 السحب متاح الآن بالكامل لأرباحك!";
        } else {
          document.getElementById('lock-notice').style.color = "#9ca3af";
          document.getElementById('lock-notice').innerText = "يجب اللعب بكامل قيمة الإيداع أولاً لتفعيل السحب";
        }
      }

      async function makeDeposit() {
        const wallet = tonConnectUI.wallet;
        if (!wallet) { alert("يرجى ربط محفظتك أولاً عبر الزر العلوي!"); return; }
        const amountInput = parseFloat(document.getElementById('amount-input').value);
        if (isNaN(amountInput) || amountInput < 0.1 || amountInput > 100000) {
          alert("❌ حدود الإيداع المسموح بها هي من 0.1 TON إلى 100,000 TON فقط.");
          return;
        }
        const nanoAmount = (amountInput * 1000000000).toString();
        const transaction = { validUntil: Math.floor(Date.now() / 1000) + 120, messages: [{ address: MY_WALLET_ADDRESS, amount: nanoAmount }] };
        try {
          await tonConnectUI.sendTransaction(transaction);
          currentBalance += amountInput;
          totalDeposited += amountInput;
          alert(`🎉 تم إضافة ${amountInput} TON لرصيدك بنجاح!`);
          updateUI();
        } catch (e) { alert("❌ تم إلغاء عملية الإيداع."); }
      }

      function openCrashGame() {
        document.getElementById('crash-modal').style.display = 'block';
        startNewCountdownPhase();
      }

      function closeCrashGame() {
        clearInterval(countdownInterval);
        clearInterval(crashInterval);
        document.getElementById('crash-modal').style.display = 'none';
        isRoundRunning = false;
      }

      function startNewCountdownPhase() {
        isRoundRunning = false;
        hasUserCashedOut = false;
        currentMultiplier = 1.00;
        
        document.getElementById('countdown-wrapper').style.display = 'flex';
        document.getElementById('multiplier-text').style.display = 'none';
        document.getElementById('rocket-element').style.display = 'none';
        document.getElementById('rocket-element').innerText = "🛸";
        document.getElementById('rocket-element').style.transform = "translate(0px, 0px)";

        const mainBtn = document.getElementById('btn-main-action');
        if (isBetPlacedForNextRound) {
          mainBtn.innerText = "Waiting for Round...";
          mainBtn.className = "btn-place-bet";
          mainBtn.disabled = true;
        } else {
          mainBtn.innerText = "Place bet";
          mainBtn.className = "btn-place-bet";
          mainBtn.disabled = false;
          mainBtn.onclick = registerUserBet;
        }

        renderRealPlayersList(false);

        let timeLeft = 5;
        document.getElementById('countdown-wrapper').innerText = timeLeft;
        
        clearInterval(countdownInterval);
        countdownInterval = setInterval(() => {
          timeLeft--;
          if (timeLeft <= 0) {
            clearInterval(countdownInterval);
            launchUFOShip(); 
          } else {
            document.getElementById('countdown-wrapper').innerText = timeLeft;
          }
        }, 1000);
      }

      function registerUserBet() {
        if (!tonConnectUI.wallet) { alert("يرجى ربط محفظتك أولاً عبر زر التوصيل العلوي!"); return; }
        const betVal = parseFloat(document.getElementById('crash-bet-input').value);
        if (isNaN(betVal) || betVal < 0.1 || betVal > 100000) { alert("تستطيع المشاركة بأي مبلغ من 0.1 إلى 100k TON"); return; }
        if (currentBalance < betVal) { alert("رصيدك الحالي غير كافٍ!"); return; }

        currentBalance -= betVal;
        userCurrentBet = betVal;
        totalPlayed += betVal;
        isBetPlacedForNextRound = true;
        updateUI();

        const mainBtn = document.getElementById('btn-main-action');
        mainBtn.innerText = "Waiting for Round...";
        mainBtn.disabled = true;

        saveUserToRealPlayersDatabase(betVal);
        renderRealPlayersList(false);
      }

      function launchUFOShip() {
        isRoundRunning = true;
        document.getElementById('countdown-wrapper').style.display = 'none';
        document.getElementById('multiplier-text').style.display = 'block';
        document.getElementById('rocket-element').style.display = 'block';

        const mainBtn = document.getElementById('btn-main-action');
        
        if (isBetPlacedForNextRound) {
          mainBtn.disabled = false;
          mainBtn.className = "btn-place-bet btn-cashout-active";
          mainBtn.innerText = `Cash Out (${(userCurrentBet * currentMultiplier).toFixed(2)} TON)`;
          mainBtn.onclick = userCashoutSuccess;
        } else {
          mainBtn.innerText = "Round in Progress...";
          mainBtn.disabled = true;
        }

        targetCrashPoint = calculateStrictCrashPoint();

        clearInterval(crashInterval);
        crashInterval = setInterval(() => {
          currentMultiplier += 0.03;
          document.getElementById('multiplier-text').innerText = `${currentMultiplier.toFixed(2)}x`;

          const posX = (currentMultiplier - 1) * 45;
          const posY = (currentMultiplier - 1) * -30;
          document.getElementById('rocket-element').style.transform = `translate(${posX}px, ${posY}px)`;

          if (isBetPlacedForNextRound && !hasUserCashedOut) {
            mainBtn.innerText = `Cash Out (${(userCurrentBet * currentMultiplier).toFixed(2)} TON)`;
          }

          if (currentMultiplier >= targetCrashPoint) {
            clearInterval(crashInterval);
            executeRoundCrash();
          }
        }, 90);
      }

      function calculateStrictCrashPoint() {
        const db = JSON.parse(localStorage.getItem('global_real_players')) || [];
        if (db.length === 0 && !isBetPlacedForNextRound) {
          return 100.00;
        }
        const rand = Math.random() * 100;
        if (rand <= 80) return parseFloat((Math.random() * (1.50 - 1.00) + 1.00).toFixed(2));
        if (rand <= 90) return parseFloat((Math.random() * (3.00 - 1.50) + 1.50).toFixed(2));
        if (rand <= 95) return parseFloat((Math.random() * (10.00 - 3.00) + 3.00).toFixed(2));
        return parseFloat((Math.random() * (50.00 - 10.00) + 10.00).toFixed(2));
      }

      function userCashoutSuccess() {
        if (!isRoundRunning || hasUserCashedOut) return;
        hasUserCashedOut = true;
        
        const winAmount = userCurrentBet * currentMultiplier;
        currentBalance += winAmount;
        updateUI();

        alert(`🎉 كاش أوت ناجح بقيمة +${winAmount.toFixed(2)} TON!`);
        
        const mainBtn = document.getElementById('btn-main-action');
        mainBtn.className = "btn-place-bet";
        mainBtn.innerText = "Cashed Out";
        mainBtn.disabled = true;

        updatePlayerStatusInDatabase(currentMultiplier, "cashed");
        renderRealPlayersList(true);
      }

      function executeRoundCrash() {
        document.getElementById('multiplier-text').innerText = `💥 Flew Away @ ${targetCrashPoint.toFixed(2)}x`;
        document.getElementById('rocket-element').innerText = "💥";
        
        const mainBtn = document.getElementById('btn-main-action');
        mainBtn.className = "btn-place-bet";
        mainBtn.innerText = "Place bet";
        mainBtn.onclick = registerUserBet;
        mainBtn.disabled = false;

        pushMultiplierToRibbon(targetCrashPoint);

        if (isBetPlacedForNextRound && !hasUserCashedOut) {
          updatePlayerStatusInDatabase(0.00, "lost");
        }

        isBetPlacedForNextRound = false;
        userCurrentBet = 0;

        renderRealPlayersList(true);
        setTimeout(() => { startNewCountdownPhase(); }, 3000);
      }

      function saveUserToRealPlayersDatabase(betVal) {
        const wallet = tonConnectUI.wallet;
        const shortAddress = wallet ? wallet.account.address.substring(0, 6) + "..." + wallet.account.address.substring(wallet.account.address.length - 4) : "Player_TON";
        const db = JSON.parse(localStorage.getItem('global_real_players')) || [];
        
        db.push({
          name: shortAddress,
          emoji: "🕹️",
          bet: betVal,
          multiplier: 0.00,
          status: "waiting"
        });
        localStorage.setItem('global_real_players', JSON.stringify(db));
      }

      function updatePlayerStatusInDatabase(mult, status) {
        const db = JSON.parse(localStorage.getItem('global_real_players')) || [];
        if(db.length > 0) {
          db[db.length - 1].multiplier = mult;
          db[db.length - 1].status = status;
        }
        localStorage.setItem('global_real_players', JSON.stringify(db));
      }

      function renderRealPlayersList(roundFinished) {
        const container = document.getElementById('live-players-list');
        container.innerHTML = "";
        const db = JSON.parse(localStorage.getItem('global_real_players')) || [];
        const displayData = db.slice(-5).reverse();

        displayData.forEach(p => {
          let badgeHtml = `<div class="player-payout waiting">⏳ طيران...</div>`;
          if (p.status === "cashed") {
            badgeHtml = `<div class="player-payout">✅ ${(p.bet * p.multiplier).toFixed(2)} TON (${p.multiplier.toFixed(2)}x)</div>`;
          } else if (p.status === "lost" || (roundFinished && p.status === "waiting")) {
            badgeHtml = `<div class="player-payout" style="background: #3a1c1c; color: #ef4444;">💥 خسارة</div>`;
          }

          container.innerHTML += `
            <div class="player-row">
              <div class="player-info">
                <div class="player-avatar">${p.emoji}</div>
                <div>
                  <div class="player-name">${p.name}</div>
                  <div class="player-bet-details">المشاركة: ${p.bet.toFixed(2)} TON</div>
                </div>
              </div>
              ${badgeHtml}
            </div>`;
        });
      }

      function pushMultiplierToRibbon(point) {
        const ribbon = document.getElementById('history-ribbon-container');
        let color = "#10b981"; 
        if (point < 1.5) color = "#ef4444"; 
        else if (point > 5) color = "#9333ea"; 

        const newBadge = document.createElement('div');
        newBadge.className = "history-badge";
        newBadge.style.background = color;
        newBadge.innerText = `${point.toFixed(2)}x`;
        
        ribbon.insertBefore(newBadge, ribbon.firstChild);
        if (ribbon.children.length > 5) { ribbon.removeChild(ribbon.lastChild); }
      }

      async function requestWithdrawal() {
        const wallet = tonConnectUI.wallet;
        if (!wallet) { alert("يرجى ربط محفظتك أولاً!"); return; }
        if (currentBalance <= 0) { alert("ليس لديك أي رصيد متاح للسحب حالياً."); return; }
        if (totalPlayed < totalDeposited) {
          const remainingRequired = totalDeposited - totalPlayed;
          alert(`❌ سحب مرفوض! المتبقي لك لتلعبه لتفعيل السحب هو: ${remainingRequired.toFixed(2)} TON.`);
          return;
        }

        const userWalletAddress = wallet.account.address;
        const withdrawAmount = currentBalance;
        const messageText = `🚨 *طلب سحب جديد من منصة الألعاب* 🚨\n\n💰 *المبلغ المطلوب:* ${withdrawAmount.toFixed(2)} TON\n👛 *محفظة اللاعب:* \`${userWalletAddress}\``;
        const telegramUrl = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
        
        try {
          const response = await fetch(telegramUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: messageText, parse_mode: 'Markdown' })
          });
          if (response.ok) {
            alert(`✅ تم إرسال طلب السحب بنجاح لـ ${withdrawAmount.toFixed(2)} TON!`);
            currentBalance = 0; 
            updateUI();
          } else { alert("❌ فشل إرسال الطلب، تأكد من إعدادات البوت والـ Chat ID."); }
        } catch (error) { alert("❌ حدث خطأ أثناء الاتصال."); }
      }
    </script>
  </body>
