<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jetton Games - منصة الألعاب الذكية</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>

    <style>
      body {
        background-color: #090b10;
        color: #f3f4f6;
        font-family: system-ui, -apple-system, sans-serif;
        margin: 0;
        padding: 0;
      }
      .navbar {
        background: #111622;
        padding: 15px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #1e2638;
      }
      .logo {
        font-size: 22px;
        font-weight: 900;
        color: #00caec;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      #ton-connect-btn {
        direction: ltr;
      }
      .hero {
        text-align: center;
        padding: 40px 20px;
        background: radial-gradient(circle at center, #1a153a 0%, #090b10 100%);
      }
      .hero h1 {
        font-size: 32px;
        margin-bottom: 10px;
        color: #fff;
      }
      .hero p {
        color: #9ca3af;
        font-size: 16px;
      }
      .deposit-box {
        background: #111622;
        max-width: 400px;
        margin: 20px auto;
        padding: 20px;
        border-radius: 14px;
        border: 1px solid #1e2638;
        text-align: center;
      }
      .deposit-btn {
        background: #10b981;
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        font-size: 16px;
        width: 100%;
        margin-top: 10px;
        transition: background 0.2s;
      }
      .deposit-btn:hover {
        background: #059669;
      }
      .games-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 15px;
        padding: 20px;
        max-width: 800px;
        margin: 0 auto;
      }
      .game-card {
        background: #111622;
        border: 1px solid #1e2638;
        border-radius: 14px;
        padding: 20px;
        text-align: center;
        cursor: pointer;
        transition: transform 0.2s, border-color 0.2s;
      }
      .game-card:hover {
        transform: translateY(-5px);
        border-color: #00caec;
      }
      .game-icon {
        font-size: 40px;
        margin-bottom: 10px;
      }
      .game-title {
        font-weight: bold;
        font-size: 16px;
        color: #fff;
      }
      .game-status {
        font-size: 12px;
        color: #00caec;
        margin-top: 5px;
      }
      .footer-panel {
        background: #111622;
        padding: 20px;
        text-align: center;
        margin-top: 40px;
        border-top: 1px solid #1e2638;
        font-size: 14px;
        color: #6b7280;
      }
    </style>
  </head>
  <body>

    <div class="navbar">
      <div class="logo">Jetton Games</div>
      <div id="ton-connect-btn"></div>
    </div>

    <div class="hero">
      <h1>العب واربح باستخدام TON</h1>
      <p>المنصة المفضلة لألعاب الحظ السريعة والعادلة على تليجرام</p>
    </div>

    <div class="deposit-box">
      <h3 style="margin: 0 0 10px 0; color: #fff;">إيداع رصيد للعب</h3>
      <p style="font-size: 14px; color: #9ca3af; margin: 0 0 15px 0;">سيتم تحويل القيمة مباشرة لحساب المنصة لتعبئة رصيدك</p>
      <button class="deposit-btn" onclick="makeDeposit()">إيداع 1 TON</button>
    </div>

    <div class="games-grid">
      <div class="game-card" onclick="playGame('Crash')">
        <div class="game-icon">🚀</div>
        <div class="game-title">Crash</div>
        <div class="game-status">اضرب المضاعف</div>
      </div>

      <div class="game-card" onclick="playGame('Mines')">
        <div class="game-icon">💣</div>
        <div class="game-title">Mines</div>
        <div class="game-status">تجنب القنابل</div>
      </div>

      <div class="game-card" onclick="playGame('Roulette')">
        <div class="game-icon">🎰</div>
        <div class="game-title">Roulette</div>
        <div class="game-status">عجلة الحظ</div>
      </div>

      <div class="game-card" onclick="playGame('Dice')">
        <div class="game-icon">🎲</div>
        <div class="game-title">Dice</div>
        <div class="game-status">توقع الرقم</div>
      </div>
    </div>

    <div class="footer-panel">
      <p>تطبيق Jetton Games متصل بشبكة TON البلوكشين</p>
    </div>

    <script>
      // تأمين جلب الرابط الحالي للموقع ديناميكياً لضمان مطابقة الـ Manifest
      const currentOrigin = window.location.origin;

      // تهيئة اتصال المحفظة باستخدام رابط بيان مباشر يتم إنشاؤه تلقائياً لتجنب مشاكل المسارات
      const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://raw.githubusercontent.com/ton-connect/demo-dapp-with-react/master/public/tonconnect-manifest.json',
        buttonRootId: 'ton-connect-btn'
      });

      // عنوان الاستقبال المعين من قبلك
      const MY_WALLET_ADDRESS = "UQBfaYCuGyjtzwd0ryubNJBsxRW5oQAxLT6WSXzPhfEzwVO4";

      // دالة تنفيذ الإيداع وتحويل الأموال
      async function makeDeposit() {
        const wallet = tonConnectUI.wallet;
        if (!wallet) {
          alert("يرجى ربط محفظتك أولاً عبر الزر العلوي!");
          return;
        }

        const transaction = {
          validUntil: Math.floor(Date.now() / 1000) + 120,
          messages: [
            {
              address: MY_WALLET_ADDRESS,
              amount: "1000000000" // 1 TON
            }
          ]
        };

        try {
          await tonConnectUI.sendTransaction(transaction);
          alert("🎉 تم الإيداع بنجاح!");
        } catch (e) {
          console.error(e);
          alert("❌ تم إلغاء عملية الإيداع.");
        }
      }

      // دالة اللعب
      function playGame(gameName) {
        const wallet = tonConnectUI.wallet;
        if (!wallet) {
          alert("يرجى ربط محفظتك أولاً لبدء اللعب برصيد TON!");
          return;
        }
        alert(`جاري تشغيل لعبة ${gameName}...`);
      }
    </script>
  </body>
</html>
