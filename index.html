<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jetton Games - منصة الألعاب الذكية</title>
    <style>
      body {
        background-color: #090b10;
        color: #f3f4f6;
        font-family: system-ui, -apple-system, sans-serif;
        margin: 0;
        padding: 0;
      }
      .navbar {
        background: #111622;
        padding: 15px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #1e2638;
      }
      .logo {
        font-size: 22px;
        font-weight: 900;
        color: #00caec;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .hero {
        text-align: center;
        padding: 40px 20px;
        background: radial-gradient(circle at center, #1a153a 0%, #090b10 100%);
      }
      .hero h1 {
        font-size: 32px;
        margin-bottom: 10px;
        color: #fff;
      }
      .hero p {
        color: #9ca3af;
        font-size: 16px;
      }
      .games-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 15px;
        padding: 20px;
        max-width: 800px;
        margin: 0 auto;
      }
      .game-card {
        background: #111622;
        border: 1px solid #1e2638;
        border-radius: 14px;
        padding: 20px;
        text-align: center;
        cursor: pointer;
        transition: transform 0.2s, border-color 0.2s;
      }
      .game-card:hover {
        transform: translateY(-5px);
        border-color: #00caec;
      }
      .game-icon {
        font-size: 40px;
        margin-bottom: 10px;
      }
      .game-title {
        font-weight: bold;
        font-size: 16px;
        color: #fff;
      }
      .game-status {
        font-size: 12px;
        color: #00caec;
        margin-top: 5px;
      }
      .footer-panel {
        background: #111622;
        padding: 20px;
        text-align: center;
        margin-top: 40px;
        border-top: 1px solid #1e2638;
        font-size: 14px;
        color: #6b7280;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.jsx"></script>
  </body>
</html>
