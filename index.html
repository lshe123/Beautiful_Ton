<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jetton Games - منصة الألعاب الذكية</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>

    <style>
      body {
        background-color: #090b10;
        color: #f3f4f6;
        font-family: system-ui, -apple-system, sans-serif;
        margin: 0;
        padding: 0;
      }
      .navbar {
        background: #111622;
        padding: 15px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #1e2638;
      }
      .logo {
        font-size: 22px;
        font-weight: 900;
        color: #00caec;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      #ton-connect-btn {
        direction: ltr;
      }
      .hero {
        text-align: center;
        padding: 40px 20px;
        background: radial-gradient(circle at center, #1a153a 0%, #090b10 100%);
      }
      .hero h1 {
        font-size: 32px;
        margin-bottom: 10px;
        color: #fff;
      }
      .hero p {
        color: #9ca3af;
        font-size: 16px;
      }
      .games-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 15px;
        padding: 20px;
        max-width: 800px;
        margin: 0 auto;
      }
      .game-card {
        background: #111622;
        border: 1px solid #1e2638;
        border-radius: 14px;
        padding: 20px;
        text-align: center;
        cursor: pointer;
        transition: transform 0.2s, border-color 0.2s;
      }
      .game-card:hover {
        transform: translateY(-5px);
        border-color: #00caec;
      }
      .game-icon {
        font-size: 40px;
        margin-bottom: 10px;
      }
      .game-title {
        font-weight: bold;
        font-size: 16px;
        color: #fff;
      }
      .game-status {
        font-size: 12px;
        color: #00caec;
        margin-top: 5px;
      }
      .footer-panel {
        background: #111622;
        padding: 20px;
        text-align: center;
        margin-top: 40px;
        border-top: 1px solid #1e2638;
        font-size: 14px;
        color: #6b7280;
      }
    </style>
  </head>
  <body>

    <div class="navbar">
      <div class="logo">Jetton Games</div>
      <div id="ton-connect-btn"></div>
    </div>

    <div class="hero">
      <h1>العب واربح باستخدام TON</h1>
      <p>المنصة المفضلة لألعاب الحظ السريعة والعادلة على تليجرام</p>
    </div>

    <div class="games-grid">
      <div class="game-card" onclick="playGame('Crash')">
        <div className="game-icon">🚀</div>
        <div class="game-title">Crash</div>
        <div class="game-status">اضرب المضاعف</div>
      </div>

      <div class="game-card" onclick="playGame('Mines')">
        <div className="game-icon">💣</div>
        <div class="game-title">Mines</div>
        <div class="game-status">تجنب القنابل</div>
      </div>

      <div class="game-card" onclick="playGame('Roulette')">
        <div className="game-icon">🎰</div>
        <div class="game-title">Roulette</div>
        <div class="game-status">عجلة الحظ</div>
      </div>

      <div class="game-card" onclick="playGame('Dice')">
        <div className="game-icon">🎲</div>
        <div class="game-title">Dice</div>
        <div class="game-status">توقع الرقم</div>
      </div>
    </div>

    <div class="footer-panel">
      <p>تطبيق Jetton Games تجريبي متصل بشبكة TON البلوكشين</p>
    </div>

    <script>
      // تهيئة اتصال محفظة TON الجاهز
      const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://jetton.games/tonconnect-manifest.json',
        buttonRootId: 'ton-connect-btn'
      });

      // دالة الضغط على الألعاب وتحقق الاتصال
      function playGame(gameName) {
        const wallet = tonConnectUI.wallet;
        if (!wallet) {
          alert("يرجى ربط محفظتك أولاً عبر الزر العلوي لبدء اللعب برصيد TON!");
          return;
        }
        
        // جلب عنوان المستخدم المربوط للاستخدام
        const userAddress = wallet.account.address;
        alert(`جاري تشغيل لعبة ${gameName}...\nالمحفظة المتصلة: ${userAddress.substring(0, 6)}...${userAddress.substring(userAddress.length - 4)}`);
      }
    </script>
  </body>
</html>
